name: CI

on:
  push:
    branches: [main]
  pull_request:

# Assumes this repository's root is the `atlas/` app (package.json at root).
# If the repo root is the parent folder, add `working-directory: atlas` to each
# run step (or a top-level `defaults.run.working-directory`).
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` runs the `postinstall` hook → `prisma generate`.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Build doesn't hit the DB (routes are dynamic), but env validation
          # needs syntactically valid placeholders.
          DATABASE_URL: postgresql://user:pass@localhost:5432/atlas
          JWT_ACCESS_SECRET: ci-access-secret-minimum-32-characters-xx
          JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters-x
